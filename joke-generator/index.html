<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-purple-600 to-blue-600 min-h-screen flex items-center justify-center p-4">
    <div class="container max-w-2xl">
        <!-- Main Card -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8">
            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold text-gray-800 dark:text-white mb-2">
                    <i class="fas fa-laugh-beam text-yellow-400"></i> Joke Generator
                </h1>
                <p class="text-gray-600 dark:text-gray-400">Get random jokes from multiple sources</p>
            </div>

            <!-- Joke Display Area -->
            <div class="bg-gradient-to-r from-purple-100 to-blue-100 dark:from-gray-700 dark:to-gray-600 rounded-xl p-8 mb-8 min-h-32 flex flex-col justify-center">
                <div id="joke-container" class="text-center">
                    <p class="text-gray-600 dark:text-gray-300 text-lg italic">Click a button to get a joke!</p>
                </div>
                <div id="loading" class="text-center hidden">
                    <div class="inline-block animate-spin">
                        <i class="fas fa-spinner text-2xl text-purple-600"></i>
                    </div>
                    <p class="text-gray-600 dark:text-gray-400 mt-2">Loading joke...</p>
                </div>
            </div>

            <!-- Joke Type Selection -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-3">Select Joke Type:</label>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                    <button onclick="setJokeType('random')" class="joke-type-btn bg-purple-600 text-white py-2 px-4 rounded-lg hover:bg-purple-700 transition font-semibold active" data-type="random">
                        Random
                    </button>
                    <button onclick="setJokeType('programming')" class="joke-type-btn bg-blue-500 text-white py-2 px-4 rounded-lg hover:bg-blue-600 transition font-semibold" data-type="programming">
                        Programming
                    </button>
                    <button onclick="setJokeType('dad')" class="joke-type-btn bg-green-500 text-white py-2 px-4 rounded-lg hover:bg-green-600 transition font-semibold" data-type="dad">
                        Dad Jokes
                    </button>
                    <button onclick="setJokeType('knock-knock')" class="joke-type-btn bg-orange-500 text-white py-2 px-4 rounded-lg hover:bg-orange-600 transition font-semibold" data-type="knock-knock">
                        Knock-Knock
                    </button>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <button onclick="getJoke()" class="bg-gradient-to-r from-purple-600 to-purple-700 text-white py-3 px-6 rounded-lg hover:from-purple-700 hover:to-purple-800 transition font-bold text-lg flex items-center justify-center gap-2">
                    <i class="fas fa-dice"></i> Get Joke
                </button>
                <button onclick="shareJoke()" class="bg-gradient-to-r from-blue-600 to-blue-700 text-white py-3 px-6 rounded-lg hover:from-blue-700 hover:to-blue-800 transition font-bold text-lg flex items-center justify-center gap-2">
                    <i class="fas fa-share"></i> Share
                </button>
            </div>

            <!-- Additional Features -->
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button onclick="copyToClipboard()" class="bg-gray-500 text-white py-2 px-4 rounded-lg hover:bg-gray-600 transition font-semibold flex items-center justify-center gap-2">
                    <i class="fas fa-copy"></i> Copy
                </button>
                <button onclick="toggleFavorite()" class="bg-red-500 text-white py-2 px-4 rounded-lg hover:bg-red-600 transition font-semibold flex items-center justify-center gap-2">
                    <i class="fas fa-heart" id="favorite-icon"></i> Favorite
                </button>
            </div>

            <!-- Stats and Info -->
            <div class="bg-gray-100 dark:bg-gray-700 rounded-lg p-4 mb-6">
                <div class="grid grid-cols-3 gap-4 text-center">
                    <div>
                        <p class="text-gray-600 dark:text-gray-400 text-sm">Jokes Loaded</p>
                        <p class="text-2xl font-bold text-purple-600 dark:text-purple-400" id="joke-count">0</p>
                    </div>
                    <div>
                        <p class="text-gray-600 dark:text-gray-400 text-sm">Favorites</p>
                        <p class="text-2xl font-bold text-red-600 dark:text-red-400" id="favorite-count">0</p>
                    </div>
                    <div>
                        <p class="text-gray-600 dark:text-gray-400 text-sm">Current Source</p>
                        <p class="text-lg font-bold text-blue-600 dark:text-blue-400" id="source-name">None</p>
                    </div>
                </div>
            </div>

            <!-- Favorites List -->
            <div class="mb-6">
                <div class="flex items-center justify-between mb-3">
                    <h3 class="text-lg font-bold text-gray-800 dark:text-white flex items-center gap-2">
                        <i class="fas fa-heart text-red-500"></i> Favorite Jokes
                    </h3>
                    <button onclick="clearFavorites()" class="text-xs bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600 transition">
                        Clear All
                    </button>
                </div>
                <div id="favorites-list" class="bg-gray-50 dark:bg-gray-700 rounded-lg p-4 max-h-48 overflow-y-auto">
                    <p class="text-gray-500 dark:text-gray-400 text-center italic">No favorites yet</p>
                </div>
            </div>

            <!-- API Info -->
            <div class="bg-blue-50 dark:bg-blue-900 border-l-4 border-blue-500 p-4 rounded">
                <p class="text-sm text-gray-700 dark:text-gray-300">
                    <i class="fas fa-info-circle text-blue-500 mr-2"></i>
                    <strong>Data Sources:</strong> Official Joke API, JokeAPI, Dad Jokes API
                </p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
