<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tienda UCAB - E-commerce Vanilla</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-white dark:bg-gray-900 transition-colors duration-300">
    <nav class="bg-white dark:bg-gray-800 shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <h1 class="text-2xl font-bold text-blue-600 dark:text-blue-400">Mi Tienda UCAB</h1>
                </div>
                <div class="flex items-center gap-4">
                    <span id="status-conexion" class="text-sm font-semibold">🟢 Online</span>
                    <button id="toggle-dark-mode" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700">
                        🌙
                    </button>
                    <button id="btn-logout" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div id="app-container" class="min-h-screen">
        <!-- El contenido se inyectará aquí dinámicamente -->
    </div>

    <!-- Service Worker Registration -->
    <script src="js/sw-register.js"></script>
    <!-- Scripts principales -->
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/catalogo.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
